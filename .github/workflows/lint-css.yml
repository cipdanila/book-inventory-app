name: CSS Quality Check

# Triggers the workflow on push or pull request events for the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Stylelint Check
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Run Stylelint to catch syntax errors and enforce best practices
      # This uses npx so you don't have to manage local node_modules
      - name: Lint CSS
        run: |
          npm install stylelint stylelint-config-standard
          npx stylelint "**/*.css" --config "{ \"extends\": \"stylelint-config-standard\" }"


